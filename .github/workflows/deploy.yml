name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION:      us-east-1
  ECR_REPOSITORY:  ${{ secrets.ECR_REPOSITORY_URL }}
  ECS_CLUSTER:     calendar-agent-cluster
  ECS_SERVICE:     calendar-agent-service
  CONTAINER_NAME:  calendar-agent

jobs:

  # ── Job 1: Run evals on every PR and push ─────────────────────────────
  evals:
    name: Run evals
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-mock

      - name: Run evals
        run: pytest evals/ -v --tb=short
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_TOKEN_PATH: ./token.json
          GOOGLE_CREDENTIALS_PATH: ./credentials.json

  # ── Job 2: Build and deploy — only on push to main ────────────────────
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    needs: evals                          # only deploy if evals pass
    if: github.ref == 'refs/heads/main'   # only on push to main, not PRs

    permissions:
      id-token: write   # required for OIDC auth to AWS
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Build React frontend ─────────────────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          VITE_API_URL: ""   # empty = same origin (served by FastAPI)

      # ── Authenticate to AWS via OIDC ─────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Build and push Docker image ──────────────────────────────────
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image
        id: build-image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REPOSITORY:latest \
            .
          docker push $ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REPOSITORY:latest
          echo "image=$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ── Deploy to ECS ────────────────────────────────────────────────
      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $CONTAINER_NAME \
            --query taskDefinition \
            > task-def.json

      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

      # ── Post-deploy summary ──────────────────────────────────────────
      - name: Deployment summary
        run: |
          echo "### Deployment complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** $ECR_REPOSITORY:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster:** $ECS_CLUSTER" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** $ECS_SERVICE" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://app.nivead.com" >> $GITHUB_STEP_SUMMARY
